<html>
  <head>
    <title>Font Style Demo</title>

      body {
        font-family: Arial, Verdana, Helvetica, sans-serif;
      }
      h1 {
        color: red;
        text-align: center;
        text-shadow: 4px 4px 6px darkgrey;
      }
      p {
        /* font-weight: bold; */

        color: gray;
        line-height: 25px;

        border-radius: 6px;
      }

    <p>
