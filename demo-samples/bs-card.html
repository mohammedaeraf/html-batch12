<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bootstrap Card</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <style>
      .card {
        width: 350px;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="card my-5 shadow rounded">
        <img
          src="img/hp-laptop.jpg"
          alt="HP Pavillion Laptop"
          class="card-img-top"
        />
        <div class="card-body">
          <h3 class="card-title">HP Pavillion Laptop</h3>
          <p class="card-text">
            HP Pavillion Laptop i7 core 11the Gen with 24GB RAM, 1 TB SSD and
            15.6" display. HP Pavillion Laptop i7 core 11the Gen with 24GB RAM,
            1 TB SSD and 15.6" display.
          </p>
          <button class="btn btn-success me-2">Buy Now</button>
          <button class="btn btn-primary">View Details</button>
        </div>
      </div>
    </div>
  </body>
</html>
