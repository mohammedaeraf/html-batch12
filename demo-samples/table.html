<!doctype html>
<!-- Document type declaration tells the browser this is an HTML5 document -->
<html lang="en">
  <head>
    <!-- Metadata: character set, viewport scaling, and page title -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Table Demo</title>
    <style>
      /* Page styling for body, headings, and table layout */
      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background-color: whitesmoke;
      }
      h1 {
        text-align: center;
        color: rgb(88, 15, 15);
      }
      h1:hover {
        text-shadow: 3px 3px 8px rgb(177, 47, 47);
      }
      table {
        text-align: center;
        width: 80%;
        border-collapse: collapse;
        margin: auto;
        background-color: white;
        box-shadow: 0px 6px 10px lightgray;
      }
      td,
      th {
        border: 1px solid rgb(248, 246, 246);
        padding: 8px;
        font-size: 14px;
      }
      th {
        background-color: royalblue;
        color: white;
      }
      tr:nth-child(even) {
        background-color: rgb(237, 231, 231);
      }
      tr:hover {
        background-color: beige;
      }
    </style>
  </head>
  <body>
    <!-- Main heading for the report -->
    <h1>Students Marks Report</h1>
    <!-- Table displays the student list with subjects and totals -->
    <table>
      <thead>
        <!-- Header row defines the column titles -->
        <tr>
          <th>Roll No.</th>
          <th>Name</th>
          <th>English</th>
          <th>Maths</th>
          <th>Science</th>
          <th>Total</th>
        </tr>
      </thead>
      <tbody>
        <!-- Body rows contain actual student mark values -->
        <tr>

  </body>
</html>
