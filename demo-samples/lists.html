<!-- Lists -->
<!doctype html>
<html lang="en">
  <head>
    <!-- Document title shown in browser tab -->
    <title>Lists Demo</title>
    <style>
      /* Page-wide styling for text and background */
      body {
        font-family: Calibri, Arial, Helvetica, sans-serif;
        background-color: rgb(234, 243, 247);
      }
      /* Styling for the main page heading */
      h1 {
        text-align: center;
        color: rgb(96, 39, 3);
      }
      /* Heading styling inside each content section */
      div > h2 {
        text-decoration: underline;
        color: rgb(148, 25, 25);
      }
      /* Unordered lists use square bullets */
      ul {
        list-style-type: square;
      }
      /* Ordered lists use lowercase alphabetic numbering */
      ol {
        list-style-type: lower-alpha;
      }
      /* Container styling for the boxed content area */
      div {
        border: 2px solid gray;
        padding: 15px;
        margin: 25px;
        background-color: white;
        border-radius: 8px;
      }
    </style>
  </head>
  <body>
    <!-- Main page heading -->
    <h1>List Demo</h1>
    <div>
      <!-- Section heading for the routine list -->
      <h2>Morning Routine</h2>
      <!-- Ordered list representing a sequence of steps -->
      <ol>
        <li>Wake Up</li>
        <li>Brush Teeth</li>
        <li>Jog for 30 mins</li>
        <li>Work out for 30 mins</li>
        <li>Take Bath</li>
        <li>Journal Entry for 15 mins</li>
      </ol>
    </div>
  </body>
</html>
