<!-- Lists -->
<!doctype html>
<html lang="en">
  <head>
    <!-- Document title shown in browser tab -->
    <title>Lists Demo</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
  </head>
  <body>
    <!-- Main page heading -->
    <h1 class="text-center text-primary mt-4">List Demo</h1>
    <div>
      <!-- Section heading for the routine list -->
      <h2>Morning Routine</h2>
      <!-- Ordered list representing a sequence of steps -->
      <ol class="list-group">
        <li class="list-group-item">Wake Up</li>
        <li class="list-group-item">Brush Teeth</li>
        <li class="list-group-item">Jog for 30 mins</li>
        <li class="list-group-item">Work out for 30 mins</li>
        <li class="list-group-item">Take Bath</li>
        <li class="list-group-item">Journal Entry for 15 mins</li>
      </ol>
    </div>
  </body>
</html>
